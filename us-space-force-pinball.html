<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Guardian Pinball</title>
  <style>
    :root {
      --bg-0: #040b1a;
      --bg-1: #081633;
      --line: #79d7ff;
      --accent: #ffd467;
      --danger: #ff6d74;
      --ink: #e9f5ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 12%, rgba(121, 215, 255, 0.18), transparent 32%),
        radial-gradient(circle at 80% 20%, rgba(255, 109, 116, 0.16), transparent 30%),
        linear-gradient(165deg, var(--bg-0), var(--bg-1));
      padding: 12px;
    }

    .game-shell {
      width: min(96vw, 620px);
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .hud-card {
      padding: 8px;
      border: 1px solid rgba(121, 215, 255, 0.45);
      background: rgba(8, 22, 51, 0.75);
      border-radius: 8px;
      text-align: center;
    }

    .hud-card b {
      display: block;
      font-size: 12px;
      color: rgba(233, 245, 255, 0.8);
      font-weight: 600;
    }

    .hud-card span {
      display: block;
      margin-top: 4px;
      font-weight: 700;
      color: var(--accent);
    }

    .board-wrap {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(121, 215, 255, 0.5);
      box-shadow: 0 0 24px rgba(121, 215, 255, 0.24);
      background: rgba(8, 22, 51, 0.75);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background:
        radial-gradient(circle at 50% -10%, rgba(121, 215, 255, 0.22), transparent 40%),
        linear-gradient(180deg, #0b1d43 0%, #08142f 60%, #060e22 100%);
    }

    .help {
      margin-top: 10px;
      padding: 8px;
      border: 1px solid rgba(121, 215, 255, 0.35);
      border-radius: 8px;
      background: rgba(8, 22, 51, 0.75);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 560px) {
      .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="hud" aria-live="polite">
      <div class="hud-card"><b>Score</b><span id="score">0</span></div>
      <div class="hud-card"><b>Best</b><span id="best">0</span></div>
      <div class="hud-card"><b>Balls</b><span id="balls">3</span></div>
      <div class="hud-card"><b>Status</b><span id="status">Ready</span></div>
    </section>

    <section class="board-wrap">
      <canvas id="game" width="540" height="900" role="img" aria-label="Classic pinball playfield"></canvas>
    </section>

    <section class="help">
      Hold Space to charge and release launch. Left Arrow or Z = left flipper. Right Arrow or X = right flipper. Enter = restart after game over.
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const ballsEl = document.getElementById("balls");
    const statusEl = document.getElementById("status");

    const board = {
      w: canvas.width,
      h: canvas.height,
      gravity: 0.22,
      friction: 0.996,
      bounce: 0.9
    };

    const state = {
      score: 0,
      best: Number(localStorage.getItem("orbitalGuardianBest") || 0),
      balls: 3,
      running: true,
      gameOver: false,
      charging: false,
      launchPower: 0,
      maxCharge: 34,
      leftPressed: false,
      rightPressed: false
    };

    const launcher = {
      laneLeft: 474,
      laneRight: 520,
      holdX: 498,
      holdY: 835,
      releaseY: 225,
      minImpulse: 6,
      maxImpulse: 19
    };

    const ball = {
      x: launcher.holdX,
      y: launcher.holdY,
      vx: 0,
      vy: 0,
      r: 10,
      launched: false,
      inShooterLane: true
    };

    const bumpers = [
      { x: 180, y: 220, r: 38, points: 150, glow: 0 },
      { x: 360, y: 220, r: 38, points: 150, glow: 0 },
      { x: 270, y: 320, r: 34, points: 180, glow: 0 },
      { x: 135, y: 410, r: 30, points: 120, glow: 0 },
      { x: 405, y: 410, r: 30, points: 120, glow: 0 }
    ];

    const slings = [
      { a: { x: 110, y: 700 }, b: { x: 220, y: 765 }, c: { x: 110, y: 805 }, pushX: -3.4 },
      { a: { x: 430, y: 700 }, b: { x: 320, y: 765 }, c: { x: 430, y: 805 }, pushX: 3.4 }
    ];

    const flippers = {
      left: { pivotX: 195, pivotY: 820, minX: 130, maxX: 260 },
      right: { pivotX: 345, pivotY: 820, minX: 280, maxX: 410 }
    };

    function resetBall() {
      ball.x = launcher.holdX;
      ball.y = launcher.holdY;
      ball.vx = 0;
      ball.vy = 0;
      ball.launched = false;
      ball.inShooterLane = true;
      state.charging = false;
      state.launchPower = 0;
      statusEl.textContent = "Ready";
    }

    function restartGame() {
      state.score = 0;
      state.balls = 3;
      state.running = true;
      state.gameOver = false;
      resetBall();
    }

    function launchBall() {
      if (!state.running || ball.launched) {
        return;
      }
      const n = state.launchPower / state.maxCharge;
      const impulse = launcher.minImpulse + (launcher.maxImpulse - launcher.minImpulse) * n;
      ball.launched = true;
      ball.inShooterLane = true;
      ball.vx = -0.8;
      ball.vy = -impulse;
      state.charging = false;
      statusEl.textContent = "Launched";
    }

    function loseBall() {
      state.balls -= 1;
      if (state.balls <= 0) {
        state.running = false;
        state.gameOver = true;
        statusEl.textContent = "Game Over";
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem("orbitalGuardianBest", String(state.best));
        }
      } else {
        resetBall();
      }
    }

    function addScore(points) {
      state.score += points;
    }

    function reflect(nx, ny) {
      const dot = ball.vx * nx + ball.vy * ny;
      if (dot < 0) {
        ball.vx -= (1 + board.bounce) * dot * nx;
        ball.vy -= (1 + board.bounce) * dot * ny;
      }
    }

    function hitCircle(cx, cy, r, kick) {
      const dx = ball.x - cx;
      const dy = ball.y - cy;
      const dist = Math.hypot(dx, dy);
      const minDist = r + ball.r;
      if (dist < minDist) {
        const nx = dx / (dist || 0.001);
        const ny = dy / (dist || 0.001);
        ball.x = cx + nx * minDist;
        ball.y = cy + ny * minDist;
        const speed = Math.max(kick, Math.hypot(ball.vx, ball.vy));
        ball.vx = nx * speed;
        ball.vy = ny * speed;
        return true;
      }
      return false;
    }

    function pointInTriangle(px, py, tri) {
      const s = (p1, p2, p3) => (p1.x - p3.x) * (p2.y - p3.y) - (p2.x - p3.x) * (p1.y - p3.y);
      const p = { x: px, y: py };
      const b1 = s(p, tri.a, tri.b) < 0;
      const b2 = s(p, tri.b, tri.c) < 0;
      const b3 = s(p, tri.c, tri.a) < 0;
      return b1 === b2 && b2 === b3;
    }

    function updateShooterLane() {
      if (!ball.inShooterLane) {
        return;
      }

      const minX = launcher.laneLeft + ball.r;
      const maxX = launcher.laneRight - ball.r;
      ball.x = Math.max(minX, Math.min(maxX, ball.x));

      // Successful launch exits at top-right and redirects into playfield.
      if (ball.y <= launcher.releaseY) {
        ball.inShooterLane = false;
        ball.x = 452;
        ball.y = 215;
        ball.vx = -5.2;
        ball.vy = Math.min(ball.vy, -5.4);
      }

      // Weak launch falls back to plunger lane for another try.
      if (ball.vy > 0 && ball.y > launcher.holdY - 8) {
        ball.x = launcher.holdX;
        ball.y = launcher.holdY;
        ball.vx = 0;
        ball.vy = 0;
        ball.launched = false;
        state.launchPower = 0;
        statusEl.textContent = "Retry Launch";
      }
    }

    function applyBoundaries() {
      // Left wall
      if (ball.x - ball.r < 22) {
        ball.x = 22 + ball.r;
        ball.vx = Math.abs(ball.vx) * 0.86;
      }

      // Top wall
      if (ball.y - ball.r < 22) {
        ball.y = 22 + ball.r;
        ball.vy = Math.abs(ball.vy) * 0.86;
      }

      // Right outer wall
      if (ball.x + ball.r > 520) {
        ball.x = 520 - ball.r;
        ball.vx = -Math.abs(ball.vx) * 0.86;
      }

      // Lockout from entering shooter lane after launch.
      if (!ball.inShooterLane && ball.x + ball.r > launcher.laneLeft && ball.y > 255) {
        ball.x = launcher.laneLeft - ball.r;
        ball.vx = -Math.abs(ball.vx) * 0.9;
      }

      // Drain area
      if (ball.y - ball.r > board.h + 12) {
        loseBall();
      }
    }

    function applySlings() {
      for (const sling of slings) {
        if (pointInTriangle(ball.x, ball.y, sling)) {
          ball.vx += sling.pushX;
          ball.vy = -Math.max(6.2, Math.abs(ball.vy) + 1.8);
          addScore(90);
        }
      }
    }

    function applyFlippers() {
      if (ball.y < 765 || ball.y > 860 || ball.vy <= 0) {
        return;
      }

      // Left flipper zone
      if (ball.x > flippers.left.minX && ball.x < flippers.left.maxX) {
        const lift = state.leftPressed ? 13 : 8;
        const pushX = state.leftPressed ? -3.8 : -1.6;
        ball.vy = -lift;
        ball.vx += pushX;
        ball.y = 762;
      }

      // Right flipper zone
      if (ball.x > flippers.right.minX && ball.x < flippers.right.maxX) {
        const lift = state.rightPressed ? 13 : 8;
        const pushX = state.rightPressed ? 3.8 : 1.6;
        ball.vy = -lift;
        ball.vx += pushX;
        ball.y = 762;
      }
    }

    function updatePhysics() {
      if (!state.running) {
        return;
      }

      if (!ball.launched) {
        ball.x = launcher.holdX;
        ball.y = launcher.holdY + state.launchPower * 1.4;
        if (state.charging) {
          state.launchPower = Math.min(state.maxCharge, state.launchPower + 0.3);
          statusEl.textContent = "Charging";
        }
        return;
      }

      ball.vy += board.gravity;
      ball.vx *= board.friction;
      ball.vy *= board.friction;
      ball.x += ball.vx;
      ball.y += ball.vy;

      updateShooterLane();
      applyBoundaries();

      for (const b of bumpers) {
        if (hitCircle(b.x, b.y, b.r, 7.1)) {
          b.glow = 1;
          addScore(b.points);
        }
        b.glow *= 0.88;
      }

      applySlings();
      applyFlippers();
    }

    function drawBoard() {
      // Outer border
      ctx.strokeStyle = "rgba(121, 215, 255, 0.85)";
      ctx.lineWidth = 4;
      ctx.strokeRect(20, 20, 500, 860);

      // Inner arch shape lines
      ctx.strokeStyle = "rgba(121, 215, 255, 0.6)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(70, 110);
      ctx.quadraticCurveTo(270, 10, 470, 110);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(72, 105);
      ctx.lineTo(72, 520);
      ctx.quadraticCurveTo(72, 610, 120, 680);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(468, 105);
      ctx.lineTo(468, 250);
      ctx.stroke();

      // Shooter lane
      ctx.strokeStyle = "rgba(121, 215, 255, 0.8)";
      ctx.lineWidth = 3;
      ctx.strokeRect(launcher.laneLeft, 90, launcher.laneRight - launcher.laneLeft, 770);

      // Launcher top guide ramp into playfield
      ctx.beginPath();
      ctx.moveTo(launcher.laneLeft, 260);
      ctx.lineTo(450, 210);
      ctx.lineTo(430, 175);
      ctx.stroke();

      // Bottom inlane guides
      ctx.beginPath();
      ctx.moveTo(92, 815);
      ctx.lineTo(170, 850);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(448, 815);
      ctx.lineTo(370, 850);
      ctx.stroke();

      // Flippers and pivots
      ctx.fillStyle = "rgba(121, 215, 255, 0.85)";
      ctx.beginPath();
      ctx.arc(flippers.left.pivotX, flippers.left.pivotY, 10, 0, Math.PI * 2);
      ctx.arc(flippers.right.pivotX, flippers.right.pivotY, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 14;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#2f8ed5";
      ctx.beginPath();
      ctx.moveTo(175, 830);
      ctx.lineTo(282, 875);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(365, 830);
      ctx.lineTo(258, 875);
      ctx.stroke();

      // Sling triangles
      for (const s of slings) {
        ctx.fillStyle = "rgba(255, 109, 116, 0.22)";
        ctx.strokeStyle = "rgba(255, 109, 116, 0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(s.a.x, s.a.y);
        ctx.lineTo(s.b.x, s.b.y);
        ctx.lineTo(s.c.x, s.c.y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }

      // Drain guide
      ctx.strokeStyle = "rgba(255, 109, 116, 0.55)";
      ctx.strokeRect(238, 874, 64, 8);
    }

    function drawBumpers() {
      for (const b of bumpers) {
        const halo = b.r + 12 + b.glow * 16;
        const g = ctx.createRadialGradient(b.x, b.y, b.r * 0.2, b.x, b.y, halo);
        g.addColorStop(0, "rgba(255, 212, 103, 0.95)");
        g.addColorStop(0.5, "rgba(121, 215, 255, 0.75)");
        g.addColorStop(1, "rgba(121, 215, 255, 0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(b.x, b.y, halo, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#143166";
        ctx.strokeStyle = "rgba(255, 212, 103, 0.9)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    function drawBall() {
      const g = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.r * 1.3);
      g.addColorStop(0, "#ffffff");
      g.addColorStop(0.6, "#d8ebff");
      g.addColorStop(1, "#6caee2");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    function drawPlunger() {
      if (ball.launched) {
        return;
      }

      const x = 527;
      const top = 640;
      const y = 850 - state.launchPower * 1.5;

      ctx.strokeStyle = "rgba(121, 215, 255, 0.85)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, top);
      ctx.lineTo(x, 860);
      ctx.stroke();

      ctx.fillStyle = "rgba(255, 212, 103, 0.95)";
      ctx.beginPath();
      ctx.arc(x, y, 12, 0, Math.PI * 2);
      ctx.fill();
    }

    function render() {
      ctx.clearRect(0, 0, board.w, board.h);
      drawBoard();
      drawBumpers();
      drawPlunger();
      drawBall();

      if (state.gameOver) {
        ctx.fillStyle = "rgba(4, 11, 26, 0.7)";
        ctx.fillRect(0, 0, board.w, board.h);
        ctx.fillStyle = "#ffd467";
        ctx.font = "700 44px Segoe UI";
        ctx.fillText("GAME OVER", 130, 430);
        ctx.font = "600 18px Segoe UI";
        ctx.fillStyle = "#e9f5ff";
        ctx.fillText("Press Enter to restart", 166, 468);
      }
    }

    function updateHud() {
      scoreEl.textContent = String(state.score);
      bestEl.textContent = String(state.best);
      ballsEl.textContent = String(state.balls);
    }

    function gameLoop() {
      updatePhysics();
      render();
      updateHud();
      requestAnimationFrame(gameLoop);
    }

    document.addEventListener("keydown", (event) => {
      if (event.repeat) {
        return;
      }

      if (event.code === "Space" && !ball.launched && state.running) {
        event.preventDefault();
        state.charging = true;
      }

      if ((event.code === "ArrowLeft" || event.code === "KeyZ") && state.running) {
        state.leftPressed = true;
      }

      if ((event.code === "ArrowRight" || event.code === "KeyX") && state.running) {
        state.rightPressed = true;
      }

      if (event.code === "Enter" && state.gameOver) {
        restartGame();
      }
    });

    document.addEventListener("keyup", (event) => {
      if (event.code === "Space") {
        launchBall();
      }

      if (event.code === "ArrowLeft" || event.code === "KeyZ") {
        state.leftPressed = false;
      }

      if (event.code === "ArrowRight" || event.code === "KeyX") {
        state.rightPressed = false;
      }
    });

    bestEl.textContent = String(state.best);
    gameLoop();
  </script>
</body>
</html>
