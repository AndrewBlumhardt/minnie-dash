<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minnie Dash 🐾</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at top, #1a1a3e 0%, #0d0d1f 100%);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  h1 {
    color: #f9c84a; margin-bottom: 10px; font-size: 2.2rem;
    letter-spacing: 3px; text-shadow: 0 2px 12px #f9c84a88;
  }
  #gameCanvas {
    border: 3px solid #c8860a; border-radius: 8px;
    box-shadow: 0 0 32px #c8860a55; display: block;
    max-width: 100%;
  }
  #ui {
    color: #f9c84a; margin-top: 10px; font-size: 1.05rem;
    letter-spacing: 1px; display: flex; gap: 24px;
  }
  #ui span { color: #fff; }
  #message {
    color: #ccc; font-size: 1rem; margin-top: 6px; height: 22px;
    text-align: center; letter-spacing: 1px;
  }
  #controls {
    color: #666; font-size: 0.82rem; margin-top: 4px; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<h1>🐾 Minnie Dash</h1>
<canvas id="gameCanvas" width="1200" height="420"></canvas>
<div id="ui">
  Treats: <span id="score">0</span> / 50
  &nbsp;|&nbsp; Best: <span id="best">0</span>
  &nbsp;|&nbsp; Lives: <span id="lives">❤️❤️❤️</span>
</div>
<div id="message">Press SPACE or click to start</div>
<div id="controls">↑ / SPACE = Jump · double-jump to clear birds · 🐿️ catch squirrels for +5!</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

const GY        = 355;
const MINNIE_X  = 88;
const WIN_SCORE = 50;
const GRAVITY   = 0.60;
const JUMP_V    = -15.5;

const C = {
  coat:'#d4a05a', coatMid:'#c8924a', coatDark:'#9a6430', coatLight:'#e8c080',
  cream:'#f2e4c4', collar:'#cc2222', collarDark:'#881111',
  eye:'#1a0a00', eyeShine:'#ffffff', eyeRim:'#3a1a00', nose:'#1a0800',
  tongue:'#e8307a',
  ground:'#5a8c3a', groundEdge:'#3c6028', dirt:'#8B6610',
  skyTop:'#5baade', skyBot:'#c6e8ff',
  obsGrey:'#888888', obsGreyL:'#aaaaaa', obsBrown:'#8B5E3C', obsBrownL:'#c8904a',
  treatA:'#d4824a', treatB:'#f0b472', treatC:'#7a3d18',
};

let state, score, best=0, lives, speed, frame;
let obstacles, treats, squirrels, clouds, trees, birds, particles;
let nextObs, nextTreat, nextBird, nextSquirrel, canDbl;

const minnie = { x:MINNIE_X, y:GY, w:52, h:36, vy:0, onGround:true, invincible:0 };

function init() {
  state='idle'; score=0; lives=3; speed=4; frame=0;
  obstacles=[]; treats=[]; squirrels=[]; birds=[]; particles=[];
  clouds=makeClouds(); trees=makeTrees();
  nextObs=110; nextTreat=70; nextBird=260; nextSquirrel=340; canDbl=true;
  minnie.y=GY-minnie.h; minnie.vy=0; minnie.onGround=true;
  minnie.invincible=0;
  updateHUD(); setMsg('Press SPACE or click to start');
}

function doJump() {
  if(minnie.onGround){
    minnie.vy=JUMP_V; minnie.onGround=false; canDbl=true;
    dustPuff(minnie.x+minnie.w/2, GY, 7, '#c8903a');
  } else if(canDbl){
    minnie.vy=JUMP_V*.82; canDbl=false;
    dustPuff(minnie.x+minnie.w/2, minnie.y+minnie.h, 5, '#d4a05a');
  }
}
function doAction() {
  if(state==='idle'||state==='dead'||state==='win'){ init(); state='running'; setMsg(''); }
  else if(state==='running') doJump();
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); doAction(); }
});
canvas.addEventListener('click', doAction);

function updateHUD() {
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
  document.getElementById('lives').textContent='❤️'.repeat(Math.max(lives,0))+'🖤'.repeat(Math.max(3-lives,0));
}
function setMsg(t){ document.getElementById('message').textContent=t; }

function dustPuff(x,y,n,col){ for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*3.5,vy:-Math.random()*2.5,life:20,maxLife:20,r:3,col}); }
function burstPuff(x,y,col){ for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2; particles.push({x,y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:30,maxLife:30,r:4,col});} }
function hitPuff(x,y){ for(let i=0;i<14;i++) particles.push({x,y,vx:(Math.random()-.5)*7,vy:-Math.random()*6,life:32,maxLife:32,r:4,col:'#f44'}); }

const OBS_TYPES=[
  {label:'cone',w:30,h:50},{label:'rock',w:46,h:34},{label:'fence',w:24,h:66},
  {label:'log',w:62,h:28},{label:'hydrant',w:30,h:46},
];
function spawnObs(){ const t=OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)]; obstacles.push({...t,x:canvas.width+24,y:GY-t.h}); }

function drawObs(o){
  ctx.save();
  if(o.label==='cone'){
    const cx=o.x+o.w/2;
    ctx.fillStyle='#ff6600';
    ctx.beginPath(); ctx.moveTo(cx,o.y); ctx.lineTo(o.x,o.y+o.h-7); ctx.lineTo(o.x+o.w,o.y+o.h-7); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#cc4400';
    ctx.beginPath(); ctx.moveTo(cx,o.y); ctx.lineTo(cx,o.y+o.h-7); ctx.lineTo(o.x+o.w,o.y+o.h-7); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff';
    [[.40,.50],[.64,.74]].forEach(([t0,t1])=>{
      const f0=t0,f1=t1;
      ctx.beginPath();
      ctx.moveTo(cx-(cx-o.x)*f0, o.y+o.h*f0); ctx.lineTo(cx+(o.x+o.w-cx)*f0, o.y+o.h*f0);
      ctx.lineTo(cx+(o.x+o.w-cx)*f1, o.y+o.h*f1); ctx.lineTo(cx-(cx-o.x)*f1, o.y+o.h*f1);
      ctx.closePath(); ctx.fill();
    });
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.roundRect(o.x-5,o.y+o.h-7,o.w+10,7,2); ctx.fill();
  } else if(o.label==='rock'){
    ctx.fillStyle=C.obsGrey; ctx.beginPath(); ctx.ellipse(o.x+o.w/2,o.y+o.h/2+4,o.w/2,o.h/2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.obsGreyL; ctx.beginPath(); ctx.ellipse(o.x+o.w/2-7,o.y+o.h/2,o.w/3,o.h/3,-.3,0,Math.PI*2); ctx.fill();
  } else if(o.label==='fence'){
    ctx.fillStyle=C.obsBrownL;
    for(let i=0;i<2;i++){ const px=o.x+i*13; ctx.fillRect(px,o.y,8,o.h); ctx.beginPath(); ctx.moveTo(px,o.y); ctx.lineTo(px+4,o.y-9); ctx.lineTo(px+8,o.y); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle=C.obsBrown; ctx.fillRect(o.x,o.y+15,o.w,6); ctx.fillRect(o.x,o.y+38,o.w,6);
  } else if(o.label==='log'){
    ctx.fillStyle=C.obsBrown; ctx.beginPath(); ctx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2,o.h/2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.obsBrownL; ctx.beginPath(); ctx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2-6,o.h/2-6,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=C.obsBrown; ctx.lineWidth=1;
    for(let r=6;r<o.w/2-6;r+=6){ ctx.beginPath(); ctx.ellipse(o.x+o.w/2,o.y+o.h/2,r,r*.4,0,0,Math.PI*2); ctx.stroke(); }
  } else if(o.label==='hydrant'){
    ctx.fillStyle='#dd2222'; ctx.fillRect(o.x+5,o.y+13,20,o.h-13); ctx.fillRect(o.x,o.y+22,30,10); ctx.fillRect(o.x+9,o.y,12,15);
    ctx.fillStyle='#992222'; ctx.fillRect(o.x+6,o.y+14,18,o.h-15);
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(o.x+15,o.y+9,5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function spawnBird(){
  const birdYs=[GY-110,GY-135,GY-160,GY-185];
  const by=birdYs[Math.floor(Math.random()*birdYs.length)];
  birds.push({x:canvas.width+32,y:by,w:52,h:30,flapOff:Math.random()*Math.PI*2});
}

function drawBird(b){
  const flap=Math.sin(frame*.22+b.flapOff), wy=flap*12;
  const cx=b.x+b.w/2, cy=b.y+b.h/2;
  ctx.save();
  // Body
  ctx.fillStyle='#5577bb'; ctx.beginPath(); ctx.ellipse(cx,cy+2,b.w/2-5,b.h/3,0,0,Math.PI*2); ctx.fill();
  // Upper wing (flapping)
  ctx.fillStyle='#4466aa'; ctx.beginPath(); ctx.ellipse(cx,cy+wy,b.w/2+2,10,-0.15,Math.PI,Math.PI*2); ctx.fill();
  // Lower wing
  ctx.fillStyle='#334d88'; ctx.beginPath(); ctx.ellipse(cx,cy-wy*.55,b.w/2-3,8,0.15,0,Math.PI); ctx.fill();
  // Tail feathers on RIGHT side (bird faces/moves left, tail trails right)
  ctx.fillStyle='#334d88'; ctx.beginPath();
  ctx.moveTo(b.x+b.w-3,cy+2); ctx.lineTo(b.x+b.w+14,cy-4); ctx.lineTo(b.x+b.w+14,cy+9); ctx.closePath(); ctx.fill();
  // Head on LEFT side (leading edge)
  ctx.fillStyle='#5577bb'; ctx.beginPath(); ctx.arc(b.x+7,cy-3,10,0,Math.PI*2); ctx.fill();
  // Beak pointing LEFT
  ctx.fillStyle='#dd9900'; ctx.beginPath();
  ctx.moveTo(b.x+2,cy-3); ctx.lineTo(b.x-12,cy); ctx.lineTo(b.x+2,cy+4); ctx.closePath(); ctx.fill();
  // Eye
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(b.x+10,cy-6,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(b.x+9,cy-7,1,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function spawnTreat(){
  const ys=[GY-22,GY-75,GY-140];
  treats.push({x:canvas.width+18,y:ys[Math.floor(Math.random()*ys.length)],w:32,h:16,angle:0,collected:false});
}
function drawTreat(t){
  const bob=Math.sin(frame*.06+t.x*.015)*3;
  t.angle=Math.sin(frame*.04)*.18;
  const bw=t.w/2,bh=t.h/2-2,nr=6;
  ctx.save(); ctx.translate(t.x+t.w/2,t.y+t.h/2+bob); ctx.rotate(t.angle);
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.beginPath(); ctx.ellipse(0,bh+4,bw+nr,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.treatB; ctx.beginPath(); ctx.roundRect(-bw,-bh,bw*2,bh*2,3); ctx.fill();
  [[-bw,-bh],[-bw,bh],[bw,-bh],[bw,bh]].forEach(([nx,ny])=>{
    ctx.beginPath(); ctx.arc(nx,ny,nr,0,Math.PI*2); ctx.fillStyle=C.treatA; ctx.fill();
    ctx.beginPath(); ctx.arc(nx-1.5,ny-1.5,1.5,0,Math.PI*2); ctx.fillStyle=C.treatB; ctx.fill();
  });
  ctx.fillStyle=C.treatC; ctx.fillRect(-bw+5,-2,(bw-5)*2,4);
  ctx.restore();
}

function spawnSquirrel(){
  const ys=[GY-32,GY-85,GY-140];
  squirrels.push({x:canvas.width+24,y:ys[Math.floor(Math.random()*ys.length)],w:38,h:42,collected:false});
}
function drawSquirrel(s){
  const bob=Math.sin(frame*.07+s.x*.013)*3;
  const sx=s.x+s.w/2, sy=s.y+s.h/2+bob;
  ctx.save();
  ctx.translate(sx,sy);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(0,s.h/2+3,13,4,0,0,Math.PI*2); ctx.fill();
  // Big fluffy tail (behind body, curls up)
  ctx.fillStyle='#7a3b10';
  ctx.beginPath(); ctx.arc(2,-8,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#9e5320';
  ctx.beginPath(); ctx.arc(2,-9,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c8784a';
  ctx.beginPath(); ctx.arc(1,-10,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#dea882';
  ctx.beginPath(); ctx.arc(0,-11,4,0,Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle='#7a3b10';
  ctx.beginPath(); ctx.ellipse(1,7,9,13,0,0,Math.PI*2); ctx.fill();
  // Belly
  ctx.fillStyle='#deb887';
  ctx.beginPath(); ctx.ellipse(1,9,5,8,0,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle='#7a3b10';
  ctx.beginPath(); ctx.arc(5,-5,9,0,Math.PI*2); ctx.fill();
  // Ears
  ctx.fillStyle='#7a3b10';
  ctx.beginPath(); ctx.moveTo(-1,-12); ctx.lineTo(-5,-20); ctx.lineTo(2,-15); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(9,-12); ctx.lineTo(14,-20); ctx.lineTo(10,-15); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#e8b0b0';
  ctx.beginPath(); ctx.moveTo(0,-13); ctx.lineTo(-3,-18); ctx.lineTo(1,-15); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,-13); ctx.lineTo(13,-18); ctx.lineTo(10,-15); ctx.closePath(); ctx.fill();
  // Eyes
  ctx.fillStyle='#1a0800';
  ctx.beginPath(); ctx.arc(2,-6,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-6,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(1,-7,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8,-7,1,0,Math.PI*2); ctx.fill();
  // Nose
  ctx.fillStyle='#331100';
  ctx.beginPath(); ctx.ellipse(6,-3,2,1.5,0,0,Math.PI*2); ctx.fill();
  // Little arms
  ctx.strokeStyle='#7a3b10'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-3,3); ctx.lineTo(-11,-1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9,3); ctx.lineTo(17,-1); ctx.stroke();
  // +5 bonus label
  ctx.fillStyle='#f9c84a'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
  ctx.fillText('+5',0,-24);
  ctx.textAlign='left';
  ctx.restore();
}

function makeClouds(){ return Array.from({length:9},(_,i)=>({x:80+i*145+Math.random()*55,y:28+Math.random()*80,w:68+Math.random()*60,spd:.32+Math.random()*.28})); }
function drawCloud(c){
  ctx.fillStyle='rgba(255,255,255,0.84)';
  ctx.beginPath(); ctx.arc(c.x,c.y,c.w*.30,0,Math.PI*2); ctx.arc(c.x+c.w*.28,c.y-c.w*.12,c.w*.22,0,Math.PI*2); ctx.arc(c.x+c.w*.52,c.y,c.w*.27,0,Math.PI*2); ctx.fill();
}
function makeTrees(){ return Array.from({length:13},(_,i)=>({x:50+i*98+Math.random()*38,h:46+Math.random()*38,spd:1.9})); }
function drawTree(t){
  ctx.fillStyle='#7a4a24'; ctx.fillRect(t.x-5,GY-t.h*.40,10,t.h*.40);
  ctx.fillStyle='#2d6a1f'; ctx.beginPath(); ctx.moveTo(t.x,GY-t.h); ctx.lineTo(t.x-22,GY-t.h*.42); ctx.lineTo(t.x+22,GY-t.h*.42); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#368a25'; ctx.beginPath(); ctx.moveTo(t.x,GY-t.h*1.22); ctx.lineTo(t.x-15,GY-t.h*.72); ctx.lineTo(t.x+15,GY-t.h*.72); ctx.closePath(); ctx.fill();
}
function drawGround(){
  ctx.fillStyle=C.ground; ctx.fillRect(0,GY,canvas.width,canvas.height-GY);
  ctx.fillStyle=C.groundEdge; ctx.fillRect(0,GY,canvas.width,6);
  ctx.fillStyle='#4a7a2a';
  for(let x=12;x<canvas.width;x+=44){ ctx.fillRect(x,GY-3,6,5); ctx.fillRect(x+10,GY-2,4,4); }
  ctx.fillStyle=C.dirt; ctx.fillRect(0,GY+18,canvas.width,canvas.height-GY-18);
}
function drawSky(){ const g=ctx.createLinearGradient(0,0,0,GY); g.addColorStop(0,C.skyTop); g.addColorStop(1,C.skyBot); ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,GY); }

function drawMinnie(){
  if(minnie.invincible>0&&Math.floor(minnie.invincible/4)%2===0) return;
  const x=minnie.x;
  const run=minnie.onGround;
  const ls=run?Math.sin(frame*.38)*6:0, tw=Math.sin(frame*.28)*10, bob=run?Math.sin(frame*.76)*1.2:0;
  const y=minnie.y;
  ctx.save();
  ctx.strokeStyle=C.coatDark; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x+4,y+16+bob);
  ctx.bezierCurveTo(x-10,y+4+tw,x-18,y-8+tw,x-8,y-12+tw);
  ctx.stroke(); ctx.strokeStyle=C.coat; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=C.coat; ctx.beginPath(); ctx.ellipse(x+26,y+18+bob,22,14,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.cream; ctx.beginPath(); ctx.ellipse(x+25,y+22+bob,12,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.coatDark;
    const lY=y+27+bob;
    ctx.fillRect(x+8,lY+ls,7,11); ctx.fillRect(x+18,lY-ls,7,11); ctx.fillRect(x+30,lY+ls*.7,7,11); ctx.fillRect(x+41,lY-ls*.7,7,11);
    ctx.fillStyle=C.cream;
    [[x+8,lY+ls+9],[x+18,lY-ls+9],[x+30,lY+ls*.7+9],[x+41,lY-ls*.7+9]].forEach(([px,py])=>{ ctx.beginPath(); ctx.ellipse(px+3.5,py+2,4.5,3,0,0,Math.PI*2); ctx.fill(); });
    ctx.fillStyle=C.coat; ctx.beginPath(); ctx.ellipse(x+44,y+10,13,11,0.15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.coatDark; ctx.beginPath(); ctx.ellipse(x+35,y+8,7,11,-0.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.coatMid; ctx.beginPath(); ctx.ellipse(x+51,y+5,6,9,0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.cream; ctx.beginPath(); ctx.ellipse(x+53,y+14,8,6,0.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.nose; ctx.beginPath(); ctx.ellipse(x+57,y+12,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.beginPath(); ctx.ellipse(x+56,y+11,1.5,1,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.eyeRim; ctx.beginPath(); ctx.arc(x+45,y+7,5.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.eye; ctx.beginPath(); ctx.arc(x+45,y+7,4.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.eyeShine; ctx.beginPath(); ctx.arc(x+43.5,y+5.5,1.8,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+46.5,y+8,0.9,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=C.collar; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(x+37,y+20,10,-0.8,0.8); ctx.stroke();
    ctx.fillStyle=C.collarDark; for(let i=0;i<3;i++){ const a=-0.4+i*0.4; ctx.beginPath(); ctx.arc(x+37+Math.cos(a)*10,y+20+Math.sin(a)*10,1.5,0,Math.PI*2); ctx.fill(); }
    ctx.fillStyle='#ddd'; ctx.beginPath(); ctx.arc(x+37+Math.cos(.7)*10,y+20+Math.sin(.7)*10+4,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.tongue; ctx.beginPath(); ctx.ellipse(x+54,y+20,3.5,5,.1,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c0205a'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x+54,y+17); ctx.lineTo(x+54,y+24); ctx.stroke();
  ctx.restore();
}

function drawOverlay(title,sub){
  ctx.fillStyle='rgba(0,0,0,0.52)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.textAlign='center';
  ctx.fillStyle='#f9c84a'; ctx.font='bold 56px Segoe UI, Arial'; ctx.fillText(title,canvas.width/2,canvas.height/2-20);
  ctx.fillStyle='#fff'; ctx.font='24px Segoe UI, Arial'; ctx.fillText(sub,canvas.width/2,canvas.height/2+28);
  ctx.textAlign='left';
}

function overlaps(ax,ay,aw,ah,bx,by,bw,bh,p=9){
  return ax+p<bx+bw-p && ax+aw-p>bx+p && ay+p<by+bh-p && ay+ah-p>by+p;
}
function hitbox(){
  return{x:minnie.x,y:minnie.y,w:minnie.w,h:minnie.h};
}
function loseLife(){
  lives--; minnie.invincible=90;
  hitPuff(minnie.x+minnie.w/2,minnie.y+minnie.h/2); updateHUD();
  if(lives<=0){ state='dead'; if(score>best){best=score;updateHUD();} }
}

function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawSky();
  clouds.forEach(c=>{ drawCloud(c); if(state==='running'){c.x-=c.spd;if(c.x+150<0)c.x=canvas.width+30;} });
  trees.forEach(t=>{ drawTree(t); if(state==='running'){t.x-=t.spd;if(t.x+32<0)t.x=canvas.width+20;} });
  drawGround();

  if(state==='running'){
    frame++; speed=4+Math.min(score*.09,10);
    if(--nextObs<=0)  { spawnObs();   nextObs=Math.max(Math.floor(95+Math.random()*70-score*.35),52); }
    if(--nextTreat<=0){ spawnTreat(); nextTreat=Math.floor(52+Math.random()*42); }
    if(score>=4&&--nextBird<=0){ spawnBird(); nextBird=Math.max(Math.floor(150+Math.random()*90-score*.6),75); }

    minnie.vy+=GRAVITY; minnie.y+=minnie.vy;
    if(minnie.y>=GY-minnie.h){ minnie.y=GY-minnie.h; minnie.vy=0; minnie.onGround=true; canDbl=true; }

    const mb=hitbox();

    obstacles=obstacles.filter(o=>o.x+o.w>-24);
    obstacles.forEach(o=>{ o.x-=speed; drawObs(o); if(minnie.invincible<=0&&overlaps(minnie.x,minnie.y,minnie.w,minnie.h,o.x,o.y,o.w,o.h)) loseLife(); });

    birds=birds.filter(b=>b.x+b.w>-36);
    birds.forEach(b=>{ b.x-=speed*1.18; drawBird(b); if(minnie.invincible<=0&&overlaps(mb.x,mb.y,mb.w,mb.h,b.x,b.y,b.w,b.h,6)) loseLife(); });

    treats=treats.filter(t=>t.x>-34&&!t.collected);
    treats.forEach(t=>{
      t.x-=speed*.88; drawTreat(t);
      if(overlaps(mb.x,mb.y,mb.w,mb.h,t.x,t.y,t.w,t.h)){
        t.collected=true; score++; burstPuff(t.x+t.w/2,t.y+t.h/2,C.treatA); updateHUD();
        if(score>=WIN_SCORE){ state='win'; if(score>best){best=score;updateHUD();} }
      }
    });

    if(score>=8&&--nextSquirrel<=0){ spawnSquirrel(); nextSquirrel=Math.max(Math.floor(280+Math.random()*160-score*.8),140); }
    squirrels=squirrels.filter(s=>s.x>-44&&!s.collected);
    squirrels.forEach(s=>{
      s.x-=speed*.88; drawSquirrel(s);
      if(overlaps(mb.x,mb.y,mb.w,mb.h,s.x,s.y,s.w,s.h)){
        s.collected=true; score+=5; burstPuff(s.x+s.w/2,s.y+s.h/2,'#f9c84a'); updateHUD();
        if(score>=WIN_SCORE){ state='win'; if(score>best){best=score;updateHUD();} }
      }
    });

    if(minnie.invincible>0) minnie.invincible--;

    if(birds.some(b=>b.x<canvas.width&&b.x+b.w>canvas.width-200)){
      ctx.save();
      ctx.fillStyle='rgba(30,10,10,0.65)'; ctx.beginPath(); ctx.roundRect(canvas.width-196,10,186,34,6); ctx.fill();
      ctx.fillStyle='#ff6655'; ctx.font='bold 18px Segoe UI,Arial'; ctx.textAlign='right';
      ctx.fillText('🐦 BIRD INCOMING — JUMP!',canvas.width-12,31); ctx.textAlign='left';
      ctx.restore();
    }
  }

  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{ ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.life--; });
  ctx.globalAlpha=1;

  drawMinnie();

  if(state==='win')  drawOverlay('You Win! 🐾',`${score} treats collected!  ·  SPACE to play again`);
  if(state==='dead') drawOverlay('Woof… Try again!',`Score: ${score}  ·  SPACE to retry`);
  if(state==='idle'){
    ctx.fillStyle='rgba(0,0,0,0.38)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign='center';
    ctx.fillStyle='#f9c84a'; ctx.font='bold 40px Segoe UI,Arial'; ctx.fillText('Help Minnie collect 50 treats!',canvas.width/2,canvas.height/2-22);
    ctx.fillStyle='#fff'; ctx.font='22px Segoe UI,Arial'; ctx.fillText('↑/SPACE = Jump  ·  double-jump to clear birds  ·  🐿️ squirrel = +5!',canvas.width/2,canvas.height/2+26);
    ctx.textAlign='left';
  }
}

init();
loop();
</script>
</body>
</html>
